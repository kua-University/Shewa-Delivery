 
# docs/api-contracts/order-service.yaml
openapi: 3.0.3
info:
  title: ShewaDelivery Order Service API
  description: Order management service for ShewaDelivery platform
  version: 1.0.0
  contact:
    name: ShewaDelivery Team
    email: api@shewadelivery.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.shewadelivery.com/order-service
    description: Production server
  - url: https://staging-api.shewadelivery.com/order-service
    description: Staging server
  - url: http://localhost:3001
    description: Local development

tags:
  - name: orders
    description: Order management endpoints
  - name: payments
    description: Payment processing
  - name: webhooks
    description: Webhook endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Order:
      type: object
      required:
        - orderNumber
        - userId
        - restaurantId
        - items
        - totalAmount
      properties:
        id:
          type: integer
          example: 12345
        orderNumber:
          type: string
          pattern: '^SW-\d{8}-\d{3}$'
          example: "SW-20241215-042"
        userId:
          type: integer
          example: 789
        restaurantId:
          type: integer
          example: 456
        driverId:
          type: integer
          nullable: true
          example: 101
        status:
          type: string
          enum:
            - pending_payment
            - confirmed
            - preparing
            - ready
            - delivering
            - delivered
            - cancelled
          default: pending_payment
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        subtotal:
          type: number
          format: decimal
          example: 450.00
        deliveryFee:
          type: number
          format: decimal
          example: 30.00
        tax:
          type: number
          format: decimal
          example: 9.00
        discountAmount:
          type: number
          format: decimal
          example: 50.00
        totalAmount:
          type: number
          format: decimal
          example: 439.00
        paymentMethod:
          type: string
          enum: [chapa, cash, telebirr, card]
        deliveryAddress:
          type: object
          properties:
            fullName:
              type: string
            phone:
              type: string
            address:
              type: string
            city:
              type: string
            latitude:
              type: number
              format: float
            longitude:
              type: number
              format: float
        specialInstructions:
          type: string
          maxLength: 500
        estimatedDeliveryTime:
          type: string
          format: date-time
        trackingUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      required:
        - name
        - price
        - quantity
      properties:
        id:
          type: integer
        menuItemId:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: decimal
        quantity:
          type: integer
          minimum: 1
        subtotal:
          type: number
          format: decimal
        specialInstructions:
          type: string
        options:
          type: array
          items:
            type: object

    CreateOrderRequest:
      type: object
      required:
        - restaurantId
        - items
        - deliveryAddress
        - paymentMethod
      properties:
        restaurantId:
          type: integer
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - menuItemId
              - quantity
            properties:
              menuItemId:
                type: integer
              quantity:
                type: integer
                minimum: 1
        deliveryAddress:
          type: object
          required:
            - address
            - city
          properties:
            fullName:
              type: string
            phone:
              type: string
            address:
              type: string
            city:
              type: string
            latitude:
              type: number
              format: float
            longitude:
              type: number
              format: float
        specialInstructions:
          type: string
          maxLength: 500
        paymentMethod:
          type: string
          enum: [chapa, cash, telebirr]
        promoCode:
          type: string

    UpdateOrderStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - confirmed
            - preparing
            - ready
            - delivering
            - delivered
            - cancelled
        reason:
          type: string
          maxLength: 255

    PaymentCallbackRequest:
      type: object
      required:
        - orderId
        - status
        - transactionId
      properties:
        orderId:
          type: integer
        status:
          type: string
          enum: [success, failed, pending]
        transactionId:
          type: string
        reference:
          type: string
        amount:
          type: number
          format: decimal
        error:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time

  parameters:
    orderIdParam:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
      description: Order ID

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - bearerAuth: []

paths:
  /orders:
    post:
      summary: Create new order
      description: Creates a new order with zero loss guarantee (ASR-01)
      tags: [orders]
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      orderId:
                        type: integer
                      orderNumber:
                        type: string
                      status:
                        type: string
                      totalAmount:
                        type: number
                      estimatedDeliveryTime:
                        type: string
                        format: date-time
        '400':
          description: Invalid request
        '500':
          description: Server error

    get:
      summary: Get user orders
      description: Returns paginated list of user orders
      tags: [orders]
      operationId: getUserOrders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, delivering, delivered, cancelled]
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Orders retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  pagination:
                    type: object

  /orders/{orderId}:
    get:
      summary: Get order by ID
      tags: [orders]
      operationId: getOrderById
      parameters:
        - $ref: '#/components/parameters/orderIdParam'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{orderId}/status:
    patch:
      summary: Update order status
      description: Update order status (restaurant/driver only)
      tags: [orders]
      operationId: updateOrderStatus
      parameters:
        - $ref: '#/components/parameters/orderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Status updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{orderId}/cancel:
    post:
      summary: Cancel order
      description: Cancel pending or confirmed order
      tags: [orders]
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/orderIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Order cancelled
        '400':
          description: Cannot cancel order
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{orderId}/payment-callback:
    post:
      summary: Payment webhook callback
      description: Internal endpoint for payment provider callbacks
      tags: [webhooks]
      operationId: paymentCallback
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/orderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallbackRequest'
      responses:
        '200':
          description: Callback processed
        '401':
          description: Invalid signature 