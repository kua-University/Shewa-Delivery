apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: shewadelivery
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  API_GATEWAY_URL: "https://api.shewadelivery.com"
  FRONTEND_URL: "https://shewadelivery.com"
  CORS_ORIGINS: "https://shewadelivery.com,https://api.shewadelivery.com"
  
  # Service URLs
  ORDER_SERVICE_URL: "http://order-service:3001"
  PAYMENT_SERVICE_URL: "http://payment-service:3003"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3005"
  DELIVERY_SERVICE_URL: "http://delivery-service:3006"
  RESTAURANT_SERVICE_URL: "http://restaurant-service:3002"
  AUTH_SERVICE_URL: "http://auth-service:3004"
  
  # Database URLs
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379"
  RABBITMQ_URL: "amqp://shewa:$(RABBITMQ_PASSWORD)@rabbitmq:5672"
  MONGODB_URI: "mongodb://$(MONGODB_USER):$(MONGODB_PASSWORD)@mongodb:27017/shewadelivery?authSource=admin"
  
  # Email/SMTP
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM: "noreply@shewadelivery.com"
  
  # Rate Limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  
  # Cache TTLs
  CACHE_TTL_MENU: "300"
  CACHE_TTL_RESTAURANT_LIST: "300"
  CACHE_TTL_SESSION: "604800"
  CACHE_TTL_DRIVER_LOCATION: "2"