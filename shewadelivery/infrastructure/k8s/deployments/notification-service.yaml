 apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: shewadelivery
  labels:
    app: notification-service
    component: notification
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        component: notification
        tier: backend
    spec:
      containers:
      - name: notification-service
        image: shewadelivery/notification-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3005
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3005"
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: rabbitmq.url
        - name: SMTP_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: smtp.host
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: smtp-user
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: smtp-password
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: twilio-sid
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: twilio-token
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
