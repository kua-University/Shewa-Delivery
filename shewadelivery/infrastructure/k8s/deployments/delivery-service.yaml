 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: shewadelivery
  labels:
    app: delivery-service
    component: tracking
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
        component: tracking
        tier: backend
    spec:
      containers:
      - name: delivery-service
        image: shewadelivery/delivery-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3006
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3006"
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: mongodb.uri
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis.url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 30
          periodSeconds: 10