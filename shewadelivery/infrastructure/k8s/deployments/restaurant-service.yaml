apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: shewadelivery
  labels:
    app: restaurant-service
    component: business
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
        component: business
        tier: backend
    spec:
      containers:
      - name: restaurant-service
        image: shewadelivery/restaurant-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: DB_HOST
          value: "postgres"
        - name: DB_NAME
          value: "shewadelivery"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: postgres-password
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis.url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10