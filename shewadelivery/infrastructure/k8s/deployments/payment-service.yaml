apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: shewadelivery
  labels:
    app: payment-service
    component: payment
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        component: payment
        tier: backend
    spec:
      containers:
      - name: payment-service
        image: shewadelivery/payment-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: DB_HOST
          value: "postgres"
        - name: DB_NAME
          value: "shewadelivery"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: postgres-password
        - name: CHAPA_API_KEY
          valueFrom:
            secretKeyRef:
              name: chapa-secrets
              key: api-key
        - name: CHAPA_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: chapa-secrets
              key: webhook-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10