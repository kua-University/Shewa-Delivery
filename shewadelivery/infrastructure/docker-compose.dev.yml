 
version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ../backend/api-gateway
    container_name: shewa-api-gateway
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://:devpass@redis:6379
      - RABBITMQ_URL=amqp://shewa:devpass@rabbitmq:5672
      - JWT_SECRET=dev-jwt-secret
      - JWT_REFRESH_SECRET=dev-refresh-secret
    volumes:
      - ../backend/api-gateway:/app
      - /app/node_modules
    depends_on:
      - redis
      - rabbitmq
    networks:
      - shewa-network

  # Order Service
  order-service:
    build: ../backend/order-service
    container_name: shewa-order-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=shewadelivery
      - DB_USER=shewa
      - DB_PASSWORD=devpass
      - REDIS_URL=redis://:devpass@redis:6379
      - RABBITMQ_URL=amqp://shewa:devpass@rabbitmq:5672
    volumes:
      - ../backend/order-service:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - shewa-network

  # Payment Service
  payment-service:
    build: ../backend/payment-service
    container_name: shewa-payment-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DB_HOST=postgres
      - DB_NAME=shewadelivery
      - DB_USER=shewa
      - DB_PASSWORD=devpass
      - CHAPA_API_KEY=test_key
    volumes:
      - ../backend/payment-service:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - shewa-network

  # Notification Service
  notification-service:
    build: ../backend/notification-service
    container_name: shewa-notification-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - RABBITMQ_URL=amqp://shewa:devpass@rabbitmq:5672
    volumes:
      - ../backend/notification-service:/app
      - /app/node_modules
    depends_on:
      - rabbitmq
    networks:
      - shewa-network

  # Delivery Service
  delivery-service:
    build: ../backend/delivery-service
    container_name: shewa-delivery-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - MONGODB_URI=mongodb://shewa:devpass@mongodb:27017/shewadelivery?authSource=admin
      - REDIS_URL=redis://:devpass@redis:6379
    volumes:
      - ../backend/delivery-service:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    networks:
      - shewa-network

  # Restaurant Service
  restaurant-service:
    build: ../backend/restaurant-service
    container_name: shewa-restaurant-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=postgres
      - DB_NAME=shewadelivery
      - DB_USER=shewa
      - DB_PASSWORD=devpass
      - REDIS_URL=redis://:devpass@redis:6379
    volumes:
      - ../backend/restaurant-service:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - shewa-network

  # Auth Service
  auth-service:
    build: ../backend/auth-service
    container_name: shewa-auth-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DB_HOST=postgres
      - DB_NAME=shewadelivery
      - DB_USER=shewa
      - DB_PASSWORD=devpass
      - JWT_SECRET=dev-jwt-secret
      - JWT_REFRESH_SECRET=dev-refresh-secret
    volumes:
      - ../backend/auth-service:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - shewa-network

  # Frontend
  frontend:
    build: ../frontend
    container_name: shewa-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:3000
    volumes:
      - ../frontend/src:/app/src
    networks:
      - shewa-network

  # Databases
  postgres:
    image: postgres:15-alpine
    container_name: shewa-postgres
    environment:
      - POSTGRES_DB=shewadelivery
      - POSTGRES_USER=shewa
      - POSTGRES_PASSWORD=devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - shewa-network

  mongodb:
    image: mongo:7
    container_name: shewa-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=shewa
      - MONGO_INITDB_ROOT_PASSWORD=devpass
      - MONGO_INITDB_DATABASE=shewadelivery
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - shewa-network

  redis:
    image: redis:7-alpine
    container_name: shewa-redis
    command: redis-server --requirepass devpass --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shewa-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: shewa-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=shewa
      - RABBITMQ_DEFAULT_PASS=devpass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - shewa-network

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  rabbitmq-data:

networks:
  shewa-network:
    driver: bridge